apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-notes-ingress
  namespace: nginx
spec:
  rules:
  - http:
      paths:
      - pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
      - pathType: Prefix
        path: /app
        backend:
          service:
            name: notes-app-service
            port: 8000
              number: 8080
